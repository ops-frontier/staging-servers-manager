name: Deploy to Lolipop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config
        run: |
          mkdir -p config
          cat > config/env.php <<PHP
          <?php
          return [
              'app' => [
                  'url' => '${{ secrets.APP_URL }}',
                  'session_name' => '${{ secrets.SESSION_NAME }}',
                  'allowed_domains' => '${{ secrets.ALLOWED_DOMAINS }}',
                  'admin_emails' => '${{ secrets.ADMIN_EMAILS }}',
              ],
              'db' => [
                  'dsn' => '${{ secrets.DB_DSN }}',
                  'user' => '${{ secrets.DB_USER }}',
                  'pass' => '${{ secrets.DB_PASS }}',
              ],
              'google' => [
                  'client_id' => '${{ secrets.GOOGLE_CLIENT_ID }}',
                  'client_secret' => '${{ secrets.GOOGLE_CLIENT_SECRET }}',
                  'redirect_uri' => '${{ secrets.GOOGLE_REDIRECT_URI }}',
              ],
          ];
          PHP

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/README.md
            **/config/env.example.php
